<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tools & Software — IncomeEdge™ Academy</title>
  <meta name="description" content="AI-powered tools and software to automate and grow your online business."/>
  <link rel="icon" type="image/webp" href="images/IncomeEdge.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--blue:#2563eb;--hot:#3b82f6;--orange:#f97316;--green:#10b981;--bg:#0a0f1e;--s1:#111827;--s2:#141d33;--text:#f8fafc;--muted:#94a3b8;--border:rgba(37,99,235,0.25);}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;z-index:9998;pointer-events:none;border:4px solid transparent;border-image:linear-gradient(var(--angle,0deg),#2563eb,#10b981,#f97316,#3b82f6) 1;}
    .mesh-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 100% 0%,rgba(16,185,129,.12) 0%,transparent 45%),radial-gradient(ellipse at 0% 100%,rgba(37,99,235,.12) 0%,transparent 45%);}

    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;gap:.85rem;padding:.7rem 1.5rem;margin:6px;border-radius:16px;background:rgba(10,15,30,.93);backdrop-filter:blur(20px);border:2px solid rgba(229,231,235,.3);box-shadow:0 4px 30px rgba(37,99,235,.15);}
    .nav-logo{display:flex;align-items:center;gap:.5rem;text-decoration:none;flex-shrink:0;}
    .nav-logo-img{width:30px;height:30px;object-fit:contain;}
    .nav-brand{font-family:'Syne',sans-serif;font-size:1rem;color:#f8fafc;font-weight:800;white-space:nowrap;}
    .hamburger{display:flex;flex-direction:column;justify-content:center;gap:5px;width:36px;height:36px;background:rgba(37,99,235,.1);border:1.5px solid rgba(37,99,235,.3);border-radius:10px;cursor:pointer;padding:8px;transition:all .2s;flex-shrink:0;}
    .hamburger span{display:block;height:2px;background:#3b82f6;border-radius:2px;transition:all .3s;}
    .hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
    .hamburger.open span:nth-child(2){opacity:0;transform:scaleX(0);}
    .hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
    .nav-menu{position:absolute;top:calc(100% + 10px);left:0;background:rgba(10,15,30,.97);backdrop-filter:blur(20px);border-radius:16px;border:2px solid rgba(37,99,235,.25);box-shadow:0 12px 40px rgba(37,99,235,.2);padding:.75rem;min-width:200px;z-index:999;opacity:0;transform:translateY(-8px) scale(.97);pointer-events:none;transition:all .22s cubic-bezier(.16,1,.3,1);}
    .nav-menu.open{opacity:1;transform:translateY(0) scale(1);pointer-events:all;}
    .nav-menu a{display:flex;align-items:center;gap:.6rem;padding:.65rem .9rem;border-radius:10px;text-decoration:none;color:var(--text);font-size:.88rem;font-weight:600;transition:all .18s;}
    .nav-menu a:hover,.nav-menu a.active{background:rgba(37,99,235,.12);color:#3b82f6;}
    .nav-menu a .menu-icon{font-size:1rem;width:22px;text-align:center;}
    .nav-right{margin-left:auto;display:flex;align-items:center;gap:.5rem;}
    .nav-search{max-width:280px;width:100%;position:relative;}
    .nav-search-input{width:100%;padding:.5rem 1.8rem .5rem 2rem;background:rgba(255,255,255,.08);border:2px solid rgba(16,185,129,.4);border-radius:99px;color:#f8fafc;font-size:.78rem;font-family:'DM Sans',sans-serif;transition:all .25s;}
    .nav-search-input:focus{outline:none;border-color:var(--hot);background:rgba(37,99,235,.1);}
    .nav-search-input::placeholder{color:#94a3b8;}
    .nav-search-icon{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);font-size:.78rem;pointer-events:none;color:#10b981;}
    .nav-search-clear{position:absolute;right:.6rem;top:50%;transform:translateY(-50%);width:16px;height:16px;border-radius:50%;background:var(--hot);border:none;color:#fff;font-size:.55rem;cursor:pointer;display:none;align-items:center;justify-content:center;}
    .nav-search-clear.show{display:flex;}
    @media(max-width:700px){nav{padding:.6rem 1rem;gap:.5rem;}.nav-brand{display:none;}.nav-search{max-width:150px;}}
    @media(max-width:500px){}}

    /* PAGINATION */
    .pagination{display:flex;align-items:center;justify-content:center;gap:.5rem;margin-top:2.5rem;flex-wrap:wrap;}
    .pg-btn{width:38px;height:38px;border-radius:10px;border:2px solid rgba(37,99,235,.25);background:rgba(37,99,235,.06);color:var(--muted);font-family:'Syne',sans-serif;font-weight:800;font-size:.85rem;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;}
    .pg-btn:hover:not(:disabled){border-color:#3b82f6;color:#3b82f6;background:rgba(37,99,235,.12);}
    .pg-btn.active{background:linear-gradient(135deg,#2563eb,#10b981);border-color:transparent;color:#fff;}
    .pg-btn:disabled{opacity:.35;cursor:not-allowed;}
    .pg-info{font-size:.75rem;color:var(--muted);font-weight:600;margin:0 .5rem;}

    /* LOADING */
    .loading-wrap{text-align:center;padding:4rem;}
    .loading-dots{display:flex;gap:.5rem;justify-content:center;margin-bottom:.8rem;}
    .loading-dots span{width:10px;height:10px;border-radius:50%;animation:bounceDot 1.2s infinite ease-in-out;}
    .loading-dots span:nth-child(1){background:#3b82f6;animation-delay:0s;}
    .loading-dots span:nth-child(2){background:#10b981;animation-delay:.15s;}
    .loading-dots span:nth-child(3){background:#f97316;animation-delay:.3s;}
    @keyframes bounceDot{0%,100%{transform:translateY(0) scale(.8);opacity:.4;}50%{transform:translateY(-10px) scale(1.1);opacity:1;}}
    .highlight{background:rgba(37,99,235,.18);color:#3b82f6;border-radius:3px;padding:0 2px;}
    .empty-state{text-align:center;padding:4rem 2rem;color:var(--muted);}
    .empty-state .ei{font-size:3rem;margin-bottom:.8rem;}

    /* FOOTER */
    /* FOOTER */
    footer{position:relative;z-index:1;text-align:center;padding:2.5rem 2rem;background:linear-gradient(135deg,#1a2540,#0f2027,#111827);margin:0 8px 8px;border-radius:24px 24px 0 0;border-top:1px solid rgba(37,99,235,.2);}
    .footer-logo{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;background:linear-gradient(135deg,#3b82f6,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.4rem;}
    .footer-socials{display:flex;align-items:center;justify-content:center;gap:.75rem;margin:1rem 0;}
    .footer-social{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:all .2s;border:1px solid rgba(255,255,255,.15);}
    .footer-social:hover{transform:translateY(-3px);}
    .footer-social.fb{background:linear-gradient(135deg,#1877f2,#0a5bc4);}
    .footer-social.ig{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);}
    .footer-social.yt{background:linear-gradient(135deg,#ff0000,#cc0000);}
    .footer-social.tt{background:linear-gradient(135deg,#010101,#2d2d2d);}
    footer p{font-size:.72rem;opacity:.6;font-weight:500;color:#fff;}
    .footer-socials{display:flex;align-items:center;justify-content:center;gap:.75rem;margin:1rem 0;}
    .footer-social{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:all .2s;border:1px solid rgba(255,255,255,.15);}
    .footer-social:hover{transform:translateY(-3px);opacity:.85;}
    .footer-social.fb{background:linear-gradient(135deg,#1877f2,#0a5bc4);}
    .footer-social.ig{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);}
    .footer-social.yt{background:linear-gradient(135deg,#ff0000,#cc0000);}
    .footer-social.tt{background:linear-gradient(135deg,#010101,#2d2d2d);}
  /* CARD */
    .prod-card{display:block;text-decoration:none;color:inherit;background:#141d33;border-radius:18px;overflow:hidden;position:relative;border:2px solid rgba(37,99,235,.2);transition:transform .25s,box-shadow .25s;cursor:pointer;}
    .prod-card:hover{transform:translateY(-5px);box-shadow:0 16px 40px rgba(37,99,235,.18);}
    .card-img{width:100%;height:170px;object-fit:contain;display:block;background:#0a0f1e;}
    .card-body{padding:.85rem;}
    .card-title{font-family:'Syne',sans-serif;font-weight:800;font-size:.88rem;color:#f8fafc;margin-bottom:.3rem;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .card-desc{font-size:.73rem;color:#cbd5e1;line-height:1.5;font-weight:500;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:.7rem;}
    .card-footer{display:flex;align-items:center;justify-content:space-between;gap:.5rem;}
    .card-price{font-family:'Syne',sans-serif;font-size:1.1rem;color:#ef4444;font-weight:800;}
    .buy-btn{display:inline-flex;align-items:center;gap:.3rem;background:linear-gradient(135deg,#f97316,#ef4444);color:#fff;font-family:'Syne',sans-serif;font-weight:800;font-size:.75rem;padding:.45rem .95rem;border-radius:8px;border:none;text-decoration:none;white-space:nowrap;transition:transform .15s;}
    .buy-btn:hover{transform:scale(1.05);}

        .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1.2rem;}

  
    /* PAGE HEADER */
    .page-header{padding:8rem 1.5rem 2rem;text-align:center;position:relative;z-index:1;}
    .page-header h1{font-family:'Syne',sans-serif;font-size:clamp(1.6rem,5vw,2.6rem);background:linear-gradient(135deg,#3b82f6,#10b981,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:800;margin-bottom:.4rem;}
    .page-header p{color:#94a3b8;font-size:.85rem;font-weight:500;}
    .store-wrap{max-width:1200px;margin:0 auto;padding:0 1.5rem 5rem;position:relative;z-index:1;}
  </style>
</head>
<body>
<div class="mesh-bg"></div>
<nav>
  <button class="hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
  <div class="nav-menu" id="navMenu">
    <a href="index.html"><span class="menu-icon">🏠</span> Home</a>
    <a href="course.html"><span class="menu-icon">📚</span> Business & Courses</a>
    <a href="tools.html" class="active"><span class="menu-icon">🛠️</span> Tools</a>
    <a href="ecommerce.html"><span class="menu-icon">🛒</span> E-Commerce</a>
  </div>
  <a class="nav-logo" href="index.html">
    <img class="nav-logo-img" src="images/IncomeEdge.webp" alt="IncomeEdge" onerror="this.style.display='none'"/>
    <span class="nav-brand">IncomeEdge™ Academy</span>
  </a>
  <div class="nav-right">
    <div class="nav-search">
      <span class="nav-search-icon">🔍</span>
      <input class="nav-search-input" id="searchInput" type="text" placeholder="Search tools…" oninput="onSearch(this.value)" autocomplete="off"/>
      <button class="nav-search-clear" id="searchClear" onclick="clearSearch()">✕</button>
    </div>
  </div>
</nav>

<div class="page-header">
  <h1>🛠️ Tools & Software</h1>
  <p>AI-powered tools to automate leads, traffic, and video content.</p>
</div>

<div class="store-wrap">
  <div id="toolsList" class="products-grid">
    <div class="loading-wrap"><div class="loading-dots"><span></span><span></span><span></span></div></div>
  </div>
  <div class="pagination" id="pagination"></div>
</div>

<footer>
  <div class="footer-logo">⚡ IncomeEdge™ Academy ⚡</div>
  <div class="footer-socials">
    <a class="footer-social fb" href="https://facebook.com/IncomeEdgeAcademy" target="_blank" rel="noopener"><svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg></a>
    <a class="footer-social ig" href="https://instagram.com/incomeedgeacademy" target="_blank" rel="noopener"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5" stroke-linecap="round"/></svg></a>
    <a class="footer-social yt" href="https://youtube.com/@IncomeEdgeAcademy" target="_blank" rel="noopener"><svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="#ff0000"/></svg></a>
    <a class="footer-social tt" href="https://tiktok.com/@incomeedgeacademy" target="_blank" rel="noopener"><svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34l-.04-8.33a8.27 8.27 0 0 0 4.84 1.55V4.98a4.85 4.85 0 0 1-1.03-.29z"/></svg></a>
  </div>
  <p>&copy; 2026 IncomeEdge Academy · All rights reserved</p>
</footer>

<script>
(function(){const btn=document.getElementById('hamburger');const menu=document.getElementById('navMenu');btn.addEventListener('click',()=>{btn.classList.toggle('open');menu.classList.toggle('open');});document.addEventListener('click',(e)=>{if(!btn.contains(e.target)&&!menu.contains(e.target)){btn.classList.remove('open');menu.classList.remove('open');}});})();
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function hl(text,q){if(!q)return esc(text);const safe=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return esc(text).replace(new RegExp(`(${safe})`,'gi'),'<mark class="highlight">$1</mark>');}

const PER_PAGE=12;
let allProducts=[],filtered=[],currentPage=1,searchQuery='';

function cardHTML(p){
  const v=p.variants&&p.variants.length?p.variants[0]:null;
  const price=v?v.price:'';
  const link=v?(v.affiliateLink||'#'):'#';
  const img=p.imageUrl?`<img class="card-img" src="${esc(p.imageUrl.replace(/^\//,''))}" loading="lazy" decoding="async" alt="${esc(p.title||'')}" onerror="this.style.display='none'">`:'';
  return `<a class="prod-card" href="${esc(link)}" target="_blank" rel="noopener">
    ${img}
    <div class="card-body">
      <div class="card-title">${esc(p.title||'')}</div>
      <div class="card-desc">${esc(p.description||'')}</div>
      <div class="card-footer">
        <span class="card-price">${esc(price)}</span>
        <span class="buy-btn">🛒 Buy Now</span>
      </div>
    </div>
  </a>`;
}

async function loadProducts(){
  try{
    const res=await fetch('products.json?t='+Date.now());
    const data=await res.json();
    allProducts=data.filter(p=>p.published&&p.category==='tools');
    applyFilter();
  }catch(e){document.getElementById('toolsList').innerHTML='<div class="empty-state"><div class="ei">⚠️</div><p>Could not load tools.</p></div>';}
}

function applyFilter(){
  const q=searchQuery.toLowerCase();
  filtered=q?allProducts.filter(p=>(p.title||'').toLowerCase().includes(q)||(p.description||'').toLowerCase().includes(q)):allProducts;
  currentPage=1;render();
}

function render(){
  const start=(currentPage-1)*PER_PAGE;
  const page=filtered.slice(start,start+PER_PAGE);
  const list=document.getElementById('toolsList');
  if(!page.length){
    list.innerHTML=`<div class="empty-state"><div class="ei">🔍</div><p>${searchQuery?'No tools found for "'+esc(searchQuery)+'"':'No tools available yet.'}</p></div>`;
    document.getElementById('pagination').innerHTML='';return;
  }
  list.innerHTML=page.map(p=>cardHTML(p)).join('');
  renderPagination();
}

function renderPagination(){
  const totalPages=Math.ceil(filtered.length/PER_PAGE);
  const pg=document.getElementById('pagination');
  if(totalPages<=1){pg.innerHTML='';return;}
  let html=`<button class="pg-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for(let i=1;i<=totalPages;i++)html+=`<button class="pg-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
  html+=`<button class="pg-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
  html+=`<span class="pg-info">${filtered.length} tools</span>`;
  pg.innerHTML=html;
}

function goPage(n){currentPage=n;render();window.scrollTo({top:0,behavior:'smooth'});}
function onSearch(val){searchQuery=val.trim();document.getElementById('searchClear').classList.toggle('show',val.length>0);applyFilter();}
function clearSearch(){document.getElementById('searchInput').value='';document.getElementById('searchClear').classList.remove('show');searchQuery='';applyFilter();}
loadProducts();
</script>
</body>
</html>
